services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: telegram-bot-db-dev
    ports:
      - "5432:5432" # Expose for DB tools (pgAdmin, DBeaver)
    environment:
      POSTGRES_DB: mydatabase_dev
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - bot-network-dev

  bot-dev:
    build: .
    container_name: telegram-bot-dev
    depends_on:
      - postgres-dev
    environment:
      - DB_HOST=postgres-dev
      - DB_NAME=mydatabase_dev
      - DB_USER=devuser
      - DB_PASS=devpass123
      - BOT_TOKEN=${BOT_TOKEN}
      - REPORT_CHAT_ID=${REPORT_CHAT_ID}
      - ERROR_CHAT_ID=${ERROR_CHAT_ID}
      - ADMINS=${ADMINS}
      - SELLER_ADMIN=${SELLER_ADMIN}
      - SUPPORT_ADMIN=${SUPPORT_ADMIN}
      - LOG_LEVEL=DEBUG
      - MAX_NAME_LENGTH=${MAX_NAME_LENGTH}
      - DEFAULT_CID_LIMIT=${DEFAULT_CID_LIMIT}
      - MAX_CID_LENGTH=${MAX_CID_LENGTH}
      - MIN_CID_LENGTH=${MIN_CID_LENGTH}
      - HEALTH_PORT=${HEALTH_PORT}
      - BOT_HEALTH_PORT=${BOT_HEALTH_PORT}
      - BASE_ADDRESS=${BASE_ADDRESS}
      - SEND_GM_GN=${SEND_GM_GN}
      - GM_TIME=${GM_TIME}
      - GN_TIME=${GN_TIME}
      - GM_GROUP_ID=${GM_GROUP_ID}
      - GM_GROUP_TOPIC_ID=${GM_GROUP_TOPIC_ID}
      - AI_URL=${AI_URL}
      - AI_SESSION_ID=${AI_SESSION_ID}
      - AI_INTERVAL=${AI_INTERVAL}
    volumes:
      - .:/app # Mount code for live changes
      - ./logs:/app/logs
    networks:
      - bot-network-dev

networks:
  bot-network-dev:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
